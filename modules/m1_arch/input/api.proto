syntax = "proto3";

package m1.arch.v1;

option go_package = "ai_eval/modules/m1_arch/input;archv1";

// v1: 旧版在线工单接口（待升级）
service TicketService {
  rpc SubmitTicket(SubmitTicketRequest) returns (SubmitTicketResponse) {}
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse) {}
}

message SubmitTicketRequest {
  string user_id = 1;
  string title = 2;
  string content = 3;
  string channel = 4; // app/web
}

message SubmitTicketResponse {
  string ticket_id = 1;
}

message GetTicketRequest {
  string ticket_id = 1;
}

message GetTicketResponse {
  string ticket_id = 1;
  string status = 2;
  string owner_id = 3;
  int64 updated_at = 4;
}
