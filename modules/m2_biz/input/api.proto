syntax = "proto3";

package m2biz;

option go_package = "ai_eval/modules/m2_biz/pb;m2bizpb";

service OrderCommandService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
}

message OrderItem {
  string sku = 1;
  int32 quantity = 2;
  int64 unit_price = 3;
}

message CreateOrderRequest {
  string request_id = 1;
  string user_id = 2;
  repeated OrderItem items = 3;
  string currency = 4;
}

message CreateOrderResponse {
  string order_id = 1;
  int64 total_amount = 2;
  string status = 3;
}
